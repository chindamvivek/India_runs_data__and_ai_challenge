ai_usage_summary: |
  Used an AI coding assistant (Antigravity by Google DeepMind) for pair
  programming: architecture design, module scaffolding, code review, and
  debugging. All scoring logic (career fit tiers, skills trust weights,
  honeypot checks, behavioral signal weights) was designed by the team and
  reviewed line-by-line before acceptance. No candidate data was fed to any
  external LLM API during the ranking pipeline itself — the pipeline is
  fully offline after the one-time precompute step.

# ============================================================
# Approach summary
# ============================================================
methodology_summary: |
  Multi-dimensional candidate ranking system with 5 weighted sub-scores:

  1. Career Fit (35%): Full career history analysis using tiered title
     matching (ML Engineer > SWE at product co > generic SWE), ML experience
     depth bonus for 36-72 months, 0.5x consulting-only multiplier, and
     job-hopping penalty for avg tenure < 18 months.

  2. Skills Fit (25%): Trust-weighted scoring where each skill score =
     base_weight x proficiency_factor x duration_factor x endorsement_factor.
     Fixed-cap normalisation (not min-max) for stability across candidate
     subsets. Contextual LangChain penalty only when no production retrieval
     skills (FAISS/Pinecone/Qdrant) are present.

  3. Behavioral (20%): 6 platform signals — recency, recruiter response
     rate, notice period, open-to-work flag, profile completeness, interview
     completion rate. Weights sum to exactly 1.0.

  4. Semantic (12%): sentence-transformers all-MiniLM-L6-v2 encoding of
     candidate profile text vs. JD query. Pre-computed as a matrix; ranking
     is a single dot-product operation taking <1 second.

  5. Location (8%): Tiered scoring for Pune/Noida/Delhi NCR > Tier-1 India
     cities > rest of India > international.

  Honeypot detection: 5 integrity checks (salary inversion, skill duration
  > career length, expert proficiency at 0 months, career date math mismatch,
  impossible education timeline) apply a negative penalty that pushes flagged
  candidates well below all legitimate candidates.

  Runtime: ~10s for 50 candidates with pre-computed embeddings.

